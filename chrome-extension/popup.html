<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --linkedin-blue: #0073b1;
      --success-green: #28a745;
      --dashboard-purple: #6f42c1;
      --text-dark: #333;
    }

    body { 
      width: 320px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      padding: 20px; 
      margin: 0;
      color: var(--text-dark);
    }

    h3 { 
      margin-top: 0; 
      color: var(--linkedin-blue); 
      text-align: center;
      border-bottom: 2px solid #f3f2ef;
      padding-bottom: 10px;
    }

    button { 
      width: 100%; 
      padding: 12px; 
      margin-bottom: 10px; 
      cursor: pointer; 
      border-radius: 6px; 
      border: none; 
      font-weight: bold; 
      font-size: 14px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }

    #analyzeBtn { background: var(--linkedin-blue); color: white; }
    #uploadBtn { background: var(--success-green); color: white; }
    #dashboardBtn { background: var(--dashboard-purple); color: white; }

    .status { 
      font-size: 13px; 
      text-align: center; 
      margin-top: 8px; 
      min-height: 20px;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 15px 0;
    }

    /* Small result card inside popup */
    #analysisResult {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px;
      display: none; /* Shown via popup.js after analysis */
      margin-bottom: 10px;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h3>ExtractResume AI</h3>
  
  <button id="analyzeBtn">🔍 Analyze This Job</button>
  <div id="result" class="status">Ready to scan LinkedIn...</div>

  <div id="analysisResult">
    </div>

  <div class="divider"></div>

  <input type="file" id="resumeUpload" style="display:none" accept=".pdf,.docx,.txt" />
  <button id="uploadBtn">📄 Update Resume</button>
  <div id="uploadStatus" class="status"></div>

  <div class="divider"></div>

  <button id="dashboardBtn">📊 View Full Skill Gaps</button>

  <script src="popup.js"></script>
</body>
</html>
