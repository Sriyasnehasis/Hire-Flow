<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExtractResume AI | Career Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0073b1; --success: #28a745; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 40px; }
        .dashboard-container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .full-width { grid-column: 1 / -1; }
        
        h2, h3 { color: #333; margin-top: 0; }
        #userName { color: var(--primary); }
        
        .skill-item { background: #fee2e2; color: #991b1b; padding: 8px 12px; border-radius: 20px; display: inline-block; margin: 5px; font-size: 13px; font-weight: bold; }
        
        /* Job Card Styling */
        .job-card { border: 1px solid #eee; padding: 15px; margin-bottom: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .job-info h4 { margin: 0; color: #333; }
        .job-info p { margin: 4px 0; font-size: 13px; color: #666; }
        .apply-btn { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        
        select, button.bulk-apply { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
        #applyBtn { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="card full-width">
            <h2>Welcome back, <span id="userName">User</span>!</h2>
            <p>Your AI-driven career insights and job matches are ready.</p>
        </div>

        <div class="card">
            <h3>Skills Proficiency</h3>
            <div style="height: 350px;">
                <canvas id="skillsChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>Optimize Your Profile</h3>
            <p>Identified skill gaps to work on:</p>
            <div id="missingSkillsContainer">
                <span class="skill-item">Loading analysis...</span>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            
            <label><strong>One-Click Bulk Apply:</strong></label>
            <select id="domainSelect">
                <option value="Python Developer">Python Developer</option>
                <option value="React Developer">React Developer</option>
                <option value="Frontend">Frontend Roles</option>
                <option value="Backend">Backend Roles</option>
            </select>
            <button id="applyBtn">Apply to All Matches</button>
            <div id="status"></div>
        </div>

        <div class="card full-width">
            <h3>Smart Match Opportunities (Scraped from LinkedIn)</h3>
            <div id="jobMatches">
                <p>Finding matching jobs in your database...</p>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
